# Configuración de Fly.io. Cambia "app" por un nombre único antes de desplegar.
app = "nomoreexcel"
primary_region = "mia"   # Miami (cercano a Guatemala)

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0   # escala a 0 cuando no se usa (arranque en frío al volver)

# pb_data en volumen persistente. IMPORTANTE: una sola máquina (PocketBase usa SQLite).
[mounts]
  source = "pb_data"
  destination = "/pb/pb_data"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
